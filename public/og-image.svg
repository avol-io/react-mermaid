<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2f4f4"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#01696f"/>
      <stop offset="60%" stop-color="#02b3bc"/>
      <stop offset="100%" stop-color="#5de0e6"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- dot grid -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(1,105,111,0.15)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- top bar accent -->
  <rect width="1200" height="4" fill="url(#brand)"/>
  <!-- logo box -->
  <rect x="80" y="200" width="56" height="56" rx="14" fill="#01696f"/>
  <circle cx="94" cy="214" r="5" fill="white" opacity="0.9"/>
  <circle cx="122" cy="214" r="5" fill="white" opacity="0.9"/>
  <circle cx="94" cy="242" r="5" fill="white" opacity="0.9"/>
  <circle cx="122" cy="242" r="5" fill="white" opacity="0.9"/>
  <circle cx="108" cy="228" r="6" fill="white"/>
  <line x1="94" y1="214" x2="122" y2="214" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="94" y1="214" x2="94" y2="242" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="94" y1="242" x2="122" y2="242" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="122" y1="214" x2="122" y2="242" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <!-- title -->
  <text x="152" y="244" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#0f172a" letter-spacing="-2">React </text>
  <text x="338" y="244" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#brand)" letter-spacing="-2">Mermaid</text>
  <!-- subtitle -->
  <text x="80" y="296" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#64748b">
    React component for Mermaid diagrams with zoom, pan, fullscreen &amp; more.
  </text>
  <!-- npm badge -->
  <rect x="80" y="340" width="52" height="28" rx="4" fill="#555d6b"/>
  <text x="106" y="359" font-family="monospace" font-size="13" fill="white" text-anchor="middle">npm</text>
  <rect x="132" y="340" width="260" height="28" rx="4" fill="#cc3534"/>
  <text x="262" y="359" font-family="monospace" font-size="13" fill="white" text-anchor="middle">@avol-io/react-mermaid</text>
  <!-- right decorative graph -->
  <circle cx="900" cy="220" r="10" fill="none" stroke="#01696f" stroke-width="2" opacity="0.4"/>
  <circle cx="980" cy="180" r="10" fill="none" stroke="#01696f" stroke-width="2" opacity="0.4"/>
  <circle cx="1060" cy="240" r="10" fill="none" stroke="#01696f" stroke-width="2" opacity="0.4"/>
  <circle cx="960" cy="310" r="10" fill="none" stroke="#01696f" stroke-width="2" opacity="0.4"/>
  <circle cx="1080" cy="320" r="10" fill="none" stroke="#02b3bc" stroke-width="2" opacity="0.5"/>
  <line x1="900" y1="220" x2="980" y2="180" stroke="#01696f" stroke-width="1.5" opacity="0.25"/>
  <line x1="980" y1="180" x2="1060" y2="240" stroke="#01696f" stroke-width="1.5" opacity="0.25"/>
  <line x1="900" y1="220" x2="960" y2="310" stroke="#01696f" stroke-width="1.5" opacity="0.25"/>
  <line x1="1060" y1="240" x2="1080" y2="320" stroke="#02b3bc" stroke-width="1.5" opacity="0.25"/>
  <line x1="960" y1="310" x2="1080" y2="320" stroke="#02b3bc" stroke-width="1.5" opacity="0.25"/>
  <!-- footer -->
  <text x="80" y="560" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#94a3b8">avol.io/react-mermaid · MIT License</text>
</svg>
